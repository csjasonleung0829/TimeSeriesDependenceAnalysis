<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Correlation & Cointegration Viewer</title>
  <link rel="stylesheet" href="assets/katex/katex.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Correlation & Cointegration Viewer</h1>
  <div class="panel controls controls-panel">
    <label for="symbolSelect"><strong>Asset symbol</strong></label>
    <select id="symbolSelect"></select>
    <button id="toggleCointegrated" class="toggle-btn" type="button">Hide non-cointegrated</button>
    <span id="status" class="status">Loading data...</span>
    <span id="meta" class="meta"></span>
  </div>

  <div id="spreadPanel" class="panel spread-panel" hidden>
    <div id="spreadTitle" class="spread-title"></div>
    <div class="spread-chart-wrap">
      <svg id="spreadSvg" viewBox="0 0 1100 420" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="spreadTooltip" class="spread-tooltip"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table id="resultTable">
      <thead>
        <tr>
          <th data-key="asset2">Paired Asset</th>
          <th data-key="correlation">ρ (Pearson)</th>
          <th data-key="beta">β</th>
          <th data-key="alpha">α</th>
          <th data-key="adf_p_spread">p<sub>ADF</sub></th>
          <th data-key="n_obs">N</th>
          <th data-key="half_life">t<sub>1/2</sub></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script defer src="assets/katex/katex.min.js"></script>
  <script defer src="script.js"></script>
</body>
</html>
